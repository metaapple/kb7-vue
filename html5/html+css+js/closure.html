<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function outer() {
        var value = 1234;
        function inner() {
          console.log('value = ' + value);
        }
        return inner;
      }
      var outin = outer();
      outin();

      //   function outcount() {
      //     var count = 0;
      //     setInterval(function () {
      //       count++;
      //       console.log(count + '초 지났습니다.');
      //     }, 1000);
      //   }
      //   outcount();

      const greeting1 = function (name) {
        return 'hello1 ' + name;
      };

      //   화살표 함수
      const greeting2 = (name) => {
        return 'hello2 ' + name;
      };

      const greeting3 = (name) => {
        return 'hello3 ' + name;
      };

      const greeting4 = () => 'hello';

      console.log(greeting1('홍길동'));
      console.log(greeting2('홍길동'));
      console.log(greeting3('홍길동'));

      // 익명함수를 변수에 할당하면 위에서 부터 순서대로 실행되어 나중에 함수가 인식됨.
      //   함수 = function () {
      //     alert('함수_A');
      //   };

      // 함수 이름을 붙여서 선언하면 js시작시 전역스쿠프의 var와 함께 호이스팅됨.
      //   function 함수() {
      //     alert('함수_B');
      //   }

      //   // 함수를 호출합니다
      //   함수();

      // fetch함수는 서버와 통신하는 자바스크립트 함수(비동기) --> then()함수를 이용해서 다음 순서대로 작성하면
      // 비동기 윗부분부터 실행되어 순서가 제어된다.
      fetch('https://jsonplaceholder.typicode.com/users')
        .then((response) => response.json())
        .then((data) => {
          console.log(data);
          console.log('다 끝났다..');
        })
        .catch((err) => console.log(err));

      //비동기를 포함하고 있는 함수가 있으면 await와 async의 쌍으로 많이 함께 사용되어 비동기 순서 제어함.
      async function init() {
        try {
          //기다리고, 그다음 실행하고
          const response = await fetch(
            'https://jsonplaceholder.typicode.com/users',
          );

          //기다리고, 그다음 실행하고
          const users = await response.json();
          console.log(users);
          console.log('진짜 진짜 다 끝났다..');
        } catch (err) {
          console.error(err);
        }
      }

      init();
      console.log('진짜 다 끝났다..');
    </script>
  </head>
  <body></body>
</html>
