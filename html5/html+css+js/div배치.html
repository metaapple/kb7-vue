<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        width: 500px;
        background-color: yellow;
        border: 1px dashed blue;
        margin: 0 auto;
      }
      #top {
        background: lightgreen;
      }
      #middle {
        overflow: hidden;
      }
      #left {
        background: red;
        width: 150px;
        float: left;
      }
      #right {
        background: blue;
        width: 350px;
        float: right;
      }
      #bottom {
        background: pink;
      }
    </style>
  </head>
  <body>
    <div id="top">top</div>
    <div id="middle">
      <div id="left">left</div>
      <div id="right">right</div>
    </div>
    <div id="bottom">bottom</div>
  </body>
</html>
